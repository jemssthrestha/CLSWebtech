<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Registration Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f2f2;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 400px;
      background: rgb(255, 255, 255);
      margin: 60px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      background: #dfdfdf;
      border: 1px solid #9b8787;
      border-radius: 5px;
      box-sizing: border-box;
    }

    .gender {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .gender input {
      width: auto;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Registration Form</h2>

    <form action="#" method="post">

      <!-- Name -->
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <!-- Password -->
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" minlength="6" required>

      <!-- Age -->
      <label for="age">Age</label>
      <input type="number" id="age" name="age" min="1" max="100">

      <!-- Date -->
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <!-- Gender -->
      <label>Gender</label>
      <div class="gender">
        <label><input type="radio" name="gender" value="Male"> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
        <label><input type="radio" name="gender" value="Other"> Other</label>
      </div>

      <!-- Country -->
      <label for="country">Country</label>
      <select id="country" name="country" required>
        <option value="">--Select Country--</option>
        <option>Nepal</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
      </select>

      <!-- Message -->
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write something..."></textarea>

      <!-- Submit -->
      <button type="submit">Submit</button>

    </form>
  </div>

</body>
</html>
